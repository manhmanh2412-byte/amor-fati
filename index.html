<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Story - Full Screen</title>
    <style>
        :root {
            --text-color: #333;
            --bg-overlay: rgba(255, 255, 255, 0.4); /* Lớp phủ nhẹ để dễ đọc chữ */
            --font-main: 'Georgia', serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ảnh nền full màn hình */
        .full-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('panda.jpg'); /* Đảm bảo file trên GitHub là panda.jpg */
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .main-container {
            text-align: center;
            background: var(--bg-overlay);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(5px); /* Làm mờ nhẹ hậu cảnh cho sang */
            max-width: 80%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .question {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--text-color);
            font-weight: bold;
            transition: all 0.8s ease;
        }

        .response {
            font-size: 1.5rem;
            color: var(--text-color);
            display: none; /* Ẩn lúc đầu */
            animation: fadeInUp 1s forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            min-height: 50px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-family: inherit;
            border: 1px solid #333;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-yes:hover {
            background: #333;
            color: white;
        }

        #btn-no {
            position: absolute;
            transition: all 0.2s ease;
            white-space: nowrap;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="full-bg"></div>

    <div class="main-container" id="ui-box">
        <div class="question" id="text-q">
            Hellu, b có thích gấu trúc hong?
        </div>
        
        <div class="response" id="text-r">
            Tui cũng thích tụi ló, heh
        </div>

        <div class="btn-group" id="btn-area">
            <button class="btn btn-yes" onclick="showLove()">Có có</button>
            <button class="btn" id="btn-no" onmouseover="runAway()">Không thích</button>
        </div>
    </div>

    <script>
        function showLove() {
            // Ẩn câu hỏi và nút
            document.getElementById('text-q').style.display = 'none';
            document.getElementById('btn-area').style.display = 'none';
            
            // Hiện câu trả lời
            document.getElementById('text-r').style.display = 'block';
            
            // Làm cho khung container mờ đi một chút cho lãng mạn
            document.getElementById('ui-box').style.background = 'rgba(255, 255, 255, 0.2)';
        }

        function runAway() {
            const btnNo = document.getElementById('btn-no');
            
            // Giới hạn để nút không chạy ra quá mép màn hình
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 100);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 100);
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }
    </script>
</body>
</html>
